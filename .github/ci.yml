name: CI

on:
  pull_request:
    branches:
      - main
      - master
      - develop
  push:
    branches:
      - main

jobs:
  build-and-test:
    name: Build & Test (Maven)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java (JDK 24)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '24'
          cache: 'maven'

      - name: Build with Maven
        run: mvn -B clean install

      - name: Run Tests
        run: mvn test

  security-checklist:
    name: Enforce Security Checklist
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Validate PR checklist
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || ""

            const requiredChecklistItems = [
              "Spoofing",
              "Tampering",
              "Repudiation",
              "Information Disclosure",
              "Denial of Service",
              "Elevation of Privilege",
              "Risk assessment"
            ];

            let missing = [];

            for (const item of requiredChecklistItems) {
              const regex = new RegExp(`- \\[x\\].*${item}`, "i");
              if (!regex.test(body)) {
                missing.push(item);
              }
            }

            if (missing.length > 0) {
              core.setFailed(
                `❌ Security checklist incomplete. Missing checks: ${missing.join(", ")}`
              );
            } else {
              console.log("✅ Security checklist completed.");
            }
